apiVersion: v1
kind: Pod
metadata:
  name: iperf-client-2
  annotations:
    enable-feature: "true"
    bandwidth-ingress: "400mb"
    bandwidth-egress: "666mb"
spec:
  containers:
  - name: iperf-client-2
    image: networkstatic/iperf3
    imagePullPolicy: Never
    command: ["/bin/sh"]
    args: ["-c", "sleep 86400"]
  restartPolicy: Never